<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launch Session | DietHive</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: var(--bg-dark);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 40px;
            overflow: hidden;
            box-shadow: var(--shadow-lg), 0 0 80px rgba(0,0,0,0.5);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }

        .visual-side {
            background: linear-gradient(145deg, rgba(139, 92, 246, 0.15) 0%, transparent 100%);
            padding: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 1px solid var(--border);
            position: relative;
        }

        .visual-side::before {
            content: '';
            position: absolute;
            top: 20%; left: 10%; width: 300px; height: 300px;
            background: var(--primary);
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
        }

        .visual-icon {
            font-size: 80px;
            color: var(--primary);
            margin-bottom: 40px;
            filter: drop-shadow(0 0 20px var(--primary-glow));
        }

        .visual-side h2 {
            font-family: 'Outfit';
            font-size: 64px;
            font-weight: 950;
            line-height: 1;
            letter-spacing: -2px;
            margin-bottom: 24px;
        }

        .visual-side p {
            font-size: 18px;
            color: var(--text-soft);
            font-weight: 600;
            max-width: 320px;
        }

        .form-side {
            padding: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header {
            margin-bottom: 48px;
        }

        .form-header h1 {
            font-family: 'Outfit';
            font-size: 42px;
            font-weight: 950;
            margin-bottom: 12px;
        }

        .form-header p {
            font-size: 16px;
            color: var(--text-dim);
            font-weight: 700;
        }

        .input-wrap {
            margin-bottom: 28px;
        }

        .input-wrap label {
            display: block;
            font-size: 10px;
            font-weight: 900;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .login-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 20px 24px;
            border-radius: 20px;
            color: #fff;
            font-family: 'Inter';
            font-size: 16px;
            font-weight: 600;
            transition: 0.3s;
        }

        .login-field:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .btn-auth {
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 20px;
            border-radius: 20px;
            font-family: 'Outfit';
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 12px;
            box-shadow: 0 10px 20px var(--primary-glow);
        }

        .btn-auth:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px var(--primary-glow);
            background: #9d7cff;
        }

        @media (max-width: 900px) {
            .login-container {
                grid-template-columns: 1fr;
            }
            .visual-side {
                display: none;
            }
            .form-side {
                padding: 40px 30px;
            }
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="visual-side">
            <div class="visual-icon"><i class="fa-solid fa-rocket"></i></div>
            <h2 class="text-gradient">DIETHIVE<br>CONSOLE</h2>
            <p>Access your high-precision performance interface and continue your journey.</p>
        </div>

        <div class="form-side">
            <div class="form-header">
                <h1>Identity Sync</h1>
                <p>Enter your credentials to authorize session.</p>
            </div>

            <form>
                <div class="input-wrap">
                    <label>Neural Identity</label>
                    <input type="text" class="login-field" placeholder="Username / Email" required>
                </div>
                <div class="input-wrap" style="position: relative;">
                    <label>Access Protocol</label>
                    <input type="password" class="login-field" placeholder="Secret Key" required>
                    <div style="text-align: right; margin-top: 12px;">
                        <a href="forgot_password.html" style="color:var(--primary); font-size:13px; font-weight:700; text-decoration:none;">Forgot Access Key?</a>
                    </div>
                </div>

                <button type="submit" class="btn-auth">AUTHORIZE SESSION</button>
            </form>

            <p style="margin-top:40px; font-size:14px; color:var(--text-dim); font-weight:700; text-align:center;">
                New Architect? <a href="signup.html" style="color:var(--primary); text-decoration:none;">Apply for Access</a>
            </p>
        </div>
    </div>

    <script>
        document.querySelector('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.querySelectorAll('.login-field')[0].value;
            const password = document.querySelectorAll('.login-field')[1].value;

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (data.status === 'success') {
                    localStorage.setItem('user_id', data.user.id);
                    localStorage.setItem('full_name', data.user.full_name);
                    localStorage.setItem('email', data.user.email);
                    window.location.href = 'home.html';
                } else {
                    alert(data.message || 'Login failed');
                }
            } catch (err) {
                console.error('Login error:', err);
                alert('Connection to server failed.');
            }
        });
    </script>
</body>
</html>
