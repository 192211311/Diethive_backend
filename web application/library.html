<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library | Wisdom Archive</title>
  <link rel="stylesheet" href="global.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Lora:ital,wght@0,400..700;1,400..700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --regal-navy: #050b1a;
      --regal-burgundy: #3d0314;
      --antique-gold: #c28d32;
      --parchment: #fdfbf4;
      --serif: 'Playfair Display', serif;
      --body-serif: 'Lora', serif;
    }

    .lib-hero {
      background: linear-gradient(135deg, var(--regal-burgundy), #000);
      padding: 100px;
      border-radius: var(--radius-super);
      text-align: center;
      border: 1px solid var(--antique-gold);
      margin-bottom: 60px;
    }

    .lib-hero h2 {
      font-family: var(--serif);
      font-size: 80px;
      font-weight: 900;
      color: var(--parchment);
      margin-bottom: 20px;
      letter-spacing: -2px;
    }

    .lib-hero p {
      font-family: var(--body-serif);
      color: var(--antique-gold);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    .genre-row {
      display: flex;
      gap: 15px;
      margin-bottom: 60px;
      overflow-x: auto;
      padding-bottom: 20px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .genre-row::-webkit-scrollbar {
      display: none;
    }

    .genre-chip {
      padding: 18px 40px;
      border: 1px solid var(--antique-gold);
      background: rgba(194, 141, 50, 0.05);
      color: var(--antique-gold);
      font-family: var(--serif);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: 0.4s;
      flex-shrink: 0;
      border-radius: 8px;
      font-size: 14px;
    }

    .genre-chip:hover,
    .genre-chip.active {
      background: var(--antique-gold);
      color: #fff;
      transform: translateY(-8px);
      box-shadow: 0 15px 35px rgba(194, 141, 50, 0.4);
    }

    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 40px;
    }

    .book-card {
      background: var(--parchment);
      color: #000;
      border-radius: 6px;
      border-left: 18px solid var(--regal-burgundy);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
      transition: 0.5s var(--ease-lux);
      cursor: pointer;
      position: relative;
    }

    .book-card:hover {
      transform: translateY(-20px) rotate(-1deg);
      box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
    }

    .book-top {
      padding: 50px;
      text-align: center;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .book-author {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 4px;
      font-weight: 950;
      color: var(--antique-gold);
      margin-bottom: 15px;
      display: block;
    }

    .book-title {
      font-family: var(--serif);
      font-size: 34px;
      font-weight: 950;
      color: #111;
      line-height: 1.1;
      letter-spacing: -0.5px;
    }

    .book-summary {
      padding: 40px;
      font-family: var(--body-serif);
      font-size: 17px;
      line-height: 1.8;
      color: #444;
      font-style: italic;
      font-weight: 600;
      text-align: center;
    }

    /* Full Reader Overlay */
    .reader-view {
      position: fixed;
      inset: 0;
      background: var(--parchment);
      color: #000;
      z-index: 10000;
      display: none;
      overflow-y: auto;
      padding: 120px 60px;
    }

    .reader-view.active {
      display: block;
      animation: bookOpen 0.6s var(--ease-lux) both;
    }

    .reader-close {
      position: fixed;
      top: 50px;
      left: 50px;
      background: #000;
      color: #fff;
      padding: 20px 40px;
      border-radius: 12px;
      font-weight: 950;
      cursor: pointer;
      border: none;
      font-family: var(--serif);
      font-size: 14px;
      letter-spacing: 2px;
    }

    .reader-close:hover {
      transform: scale(1.05);
      filter: brightness(1.2);
    }

    .reader-body {
      max-width: 850px;
      margin: 0 auto;
    }

    .reader-body h2 {
      font-family: var(--serif);
      font-size: 64px;
      font-weight: 950;
      margin-bottom: 60px;
      line-height: 1.1;
      text-align: center;
      border-bottom: 2px solid var(--antique-gold);
      padding-bottom: 40px;
      color: var(--regal-burgundy);
    }

    .reader-body p {
      font-size: 22px;
      line-height: 2.2;
      text-align: justify;
      font-family: var(--body-serif);
      margin-bottom: 40px;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <div class="app-layout">
    <aside class="sidebar">
      <div class="logo"><i class="fa-solid fa-rocket" style="color:var(--primary)"></i> DietHive</div>
      <nav class="nav-links">
        <a href="home.html" class="nav-link"><i class="fa-solid fa-house"></i> Home</a>
        <a href="library.html" class="nav-link active"><i class="fa-solid fa-book-open"></i> Library</a>
        <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
        <a href="people_progress.html" class="nav-link"><i class="fa-solid fa-users"></i> People's Progress</a>
        <a href="profile.html" class="nav-link"><i class="fa-solid fa-user"></i> Profile</a>
      </nav>
    </aside>

    <section class="main-wrapper">
      <header class="top-header">
        <div class="header-title">
          <h1>THE GREAT ARCHIVE</h1>
        </div>
        <div class="header-actions">
          <button class="menu-trigger" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
        </div>
      </header>

      <div class="container">
        <section class="lib-hero">
          <h2>WISDOM VAULT</h2>
          <p>Motivation • Discipline • Performance</p>
        </section>

        <div class="genre-row" id="genreNav">
          <!-- Sorted Nav -->
        </div>

        <div class="books-grid" id="booksGrid">
          <!-- Book Cards -->
        </div>
      </div>
    </section>
  </div>

  <!-- Reader Overlay -->
  <div class="reader-view" id="readerView">
    <button class="reader-close" onclick="closeReader()">RETURN TO ARCHIVE</button>
    <div class="reader-body" id="readerContent"></div>
  </div>

  <!-- Multi-Page Menu Overlay -->
  <div class="overlay" id="menuOverlay">
    <button
      style="position:fixed; top:50px; right:50px; background:rgba(255,255,255,0.1); border:none; width:70px; height:70px; border-radius:24px; color:#fff; cursor:pointer; font-size:30px;"
      onclick="toggleMenu()"><i class="fa-solid fa-xmark"></i></button>
    <div class="overlay-grid">
      <a href="about.html" class="overlay-card"><i class="fa-solid fa-info-circle"></i><b>About App</b></a>
      <a href="streak.html" class="overlay-card"><i class="fa-solid fa-trophy"
          style="color:var(--warning)"></i><b>Trophy Room</b></a>
      <a href="library.html" class="overlay-card"><i class="fa-solid fa-book-open"></i><b>Library</b></a>
      <a href="buddybot.html" class="overlay-card"><i class="fa-solid fa-robot"
          style="color:var(--success)"></i><b>Buddy Bot</b></a>
      <a href="people_progress.html" class="overlay-card"><i class="fa-solid fa-users"
          style="color:var(--secondary)"></i><b>People's Progress</b></a>
      <a href="notifications.html" class="overlay-card"><i class="fa-solid fa-bell"></i><b>Notifications</b></a>
      <a href="settings.html" class="overlay-card"><i class="fa-solid fa-cog"></i><b>Settings</b></a>
    </div>
  </div>

  <script>
    const store = {
      "IGNITION": [
        { id: 1, title: "The 5 AM Protocol", author: "Vanguard", summary: "Mastering the early hours of survival and triumph.", text: "<h2>The 5 AM Protocol</h2><p>The great masters of history did not wait for the sun. They anticipated it. Waking up at 5:00 AM is the first activation of your neurological dominance. It is the hour when the world is quiet, and your potential is loudest.</p><p>By owning the first sixty minutes, you architect the trajectory of your entire existence. Discipline is not a burden; it is a weapon. When you choose to leave the comfort of sleep for the clarity of purpose, you are signaling to the universe that you are ready for elite responsibility.</p>" },
        { id: 2, title: "Zero Friction Starts", author: "Zero", summary: "Removing friction from your morning cycles.", text: "<h2>Zero Friction Starts</h2><p>Friction is the enemy of progress. If you spend your morning looking for your shoes, you have already lost the battle. Prepare your equipment the night before. Your environment should be a theater of prepared success.</p><p>Remove every decision from your first hour so that your mind remains focused on the primary objective. A clean workspace and a pre-planned schedule allow you to ignite your productivity without hesitation.</p>" },
        { id: 3, title: "The Spark Cycle", author: "Ignis", summary: "Lighting the mental fire for high-pressure days.", text: "<h2>The Spark Cycle</h2><p>Your mind requires an initiation pulse. A cold shower, a sharp breath, a focused intention—these are the sparks that light the fire of productivity. Don't wait for motivation to find you. Create it through physical and mental friction.</p>" },
        { id: 4, title: "The First Win", author: "Victor", summary: "Why the first task defined everything.", text: "<h2>The First Win</h2><p>Success is a momentum game. Completing a difficult task first thing in the morning creates a powerful psychological feedback loop. It tells your brain: 'I am a person who finishes things.' This confidence carries through to every subsequent challenge.</p>" },
        { id: 5, title: "Neural Priming", author: "Synapse", summary: "Directing your focus before the day begins.", text: "<h2>Neural Priming</h2><p>Priming is the art of directing your focus before the flood of information begins. By spending five minutes visualizing your day's top priorities, you are engaging the reticular activating system to filter for opportunities that align with your goals.</p>" }
      ],
      "RESILIENCE": [
        { id: 6, title: "Winter of the Soul", author: "Frost", summary: "Building mental fortitude in difficult times.", text: "<h2>Winter of the Soul</h2><p>Difficulty is the weight room of the character. When plans fail and storms arrive, the resilient mind does not break—it adapts. This story teaches the art of Stoic endurance: seeing every obstacle as fuel for your growth.</p><p>The harder the winter, the stronger the roots. Each challenge you overcome adds a layer of reinforced armor to your psyche. Embrace the struggle, for it is the architect of your future strength.</p>" },
        { id: 7, title: "The Adaptive Mind", author: "Cortex", summary: "How to pivot when life changes the rules.", text: "<h2>The Adaptive Mind</h2><p>Rigidity leads to breakage. Fluidity leads to flow. Learn to maintain your internal peace while external circumstances shift. Resilience is not about standing still; it's about staying focused while moving through chaos.</p>" },
        { id: 8, title: "Forged in Fire", author: "Anvil", summary: "Masters who turned failure into power.", text: "<h2>Forged in Fire</h2><p>Every master was once a disaster. Failure is not the opposite of success; it is a crucial component of it. By embracing the heat of challenges, we burn away our weaknesses and emerge as stronger, more refined versions of ourselves.</p>" },
        { id: 9, title: "The Quiet Warrior", author: "Zen", summary: "Maintaining internal silence during storms.", text: "<h2>The Quiet Warrior</h2><p>The most powerful warriors are not the loudest. They are the ones who can maintain a center of calm in the middle of a battlefield. Silence is a form of strength that allows for high-precision decision-making when everyone else is panicking.</p>" },
        { id: 10, title: "Bouncing Back", author: "Recoil", summary: "The physics of professional recovery.", text: "<h2>Bouncing Back</h2><p>Recovery is as important as performance. Professional resilience requires understanding when to push and when to regenerate. Learn the systems of physical and mental rest that allow for maximum elasticity in your career and life.</p>" }
      ]
    };

    let currentGenre = "IGNITION";

    function renderArchive() {
      const nav = document.getElementById('genreNav');
      const grid = document.getElementById('booksGrid');
      nav.innerHTML = ''; grid.innerHTML = '';

      Object.keys(store).forEach(genre => {
        const chip = document.createElement('div');
        chip.className = `genre-chip ${genre === currentGenre ? 'active' : ''}`;
        chip.innerText = genre;
        chip.onclick = () => { currentGenre = genre; renderArchive(); };
        nav.appendChild(chip);
      });

      store[currentGenre].forEach(book => {
        const card = document.createElement('div');
        card.className = 'book-card';
        card.onclick = () => openReader(book);
        card.innerHTML = `
                    <div class="book-top">
                        <span class="book-author">${book.author}</span>
                        <h3 class="book-title">${book.title}</h3>
                    </div>
                    <div class="book-summary">"${book.summary}"</div>
                `;
        grid.appendChild(card);
      });
    }

    function openReader(book) {
      document.getElementById('readerContent').innerHTML = book.text;
      document.getElementById('readerView').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeReader() {
      document.getElementById('readerView').classList.remove('active');
      document.body.style.overflow = 'auto';
    }

    function toggleMenu() {
      document.getElementById('menuOverlay').classList.toggle('active');
    }

    renderArchive();
  </script>
</body>

</html>
