<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Detailed Stats</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .stats-hero {
            display: flex;
            gap: 30px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .main-chart {
            flex: 2;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 50px;
            min-width: 500px;
        }

        .small-metrics {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 300px;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 35px;
            text-align: center;
        }

        .metric-card .val {
            font-family: 'Outfit';
            font-size: 48px;
            font-weight: 900;
            margin: 10px 0;
        }

        .bar-container {
            display: flex;
            align-items: flex-end;
            gap: 15px;
            height: 250px;
            margin-top: 40px;
        }

        .bar {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            position: relative;
        }

        .bar-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            border-radius: 10px;
            background: linear-gradient(to top, var(--primary), var(--secondary));
            animation: scaleUp 1s ease both;
        }

        @keyframes scaleUp {
            from {
                height: 0;
            }

            to {
                height: var(--h);
            }
        }
    </style>
</head>

<body>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="logo"><i class="fa-solid fa-rocket" style="color:var(--primary)"></i> DietHive</div>
            <nav class="nav-links">
                <a href="home.html" class="nav-link"><i class="fa-solid fa-house"></i> Home</a>
                <a href="library.html" class="nav-link"><i class="fa-solid fa-book-open"></i> Library</a>
                <a href="dashboard.html" class="nav-link active"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="people_progress.html" class="nav-link"><i class="fa-solid fa-users"></i> People's Progress</a>
                <a href="profile.html" class="nav-link"><i class="fa-solid fa-user"></i> Profile</a>
            </nav>
        </aside>

        <section class="main-wrapper">
            <header class="top-header">
                <div class="header-title">
                    <h1>DETAILED STATS</h1>
                </div>
                <div class="header-actions">
                    <button class="menu-trigger" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
                </div>
            </header>

            <div class="container">
                <section class="stats-hero">
                    <div class="main-chart">
                        <h3 style="font-family:'Outfit'; font-size:28px; font-weight:800;">Activity Wave</h3>
                        <div class="bar-container">
                            <div class="bar">
                                <div class="bar-fill" style="--h: 40%"></div>
                            </div>
                            <div class="bar">
                                <div class="bar-fill" style="--h: 60%; animation-delay: 0.1s"></div>
                            </div>
                            <div class="bar">
                                <div class="bar-fill" style="--h: 80%; animation-delay: 0.2s"></div>
                            </div>
                            <div class="bar">
                                <div class="bar-fill" style="--h: 50%; animation-delay: 0.3s"></div>
                            </div>
                            <div class="bar">
                                <div class="bar-fill" style="--h: 90%; animation-delay: 0.4s"></div>
                            </div>
                            <div class="bar">
                                <div class="bar-fill" style="--h: 70%; animation-delay: 0.5s"></div>
                            </div>
                            <div class="bar">
                                <div class="bar-fill" style="--h: 100%; animation-delay: 0.6s"></div>
                            </div>
                        </div>
                        <div
                            style="display: flex; justify-content: space-between; margin-top:20px; color:var(--text-dim); font-weight:700; font-size:12px;">
                            <span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span><span>SUN</span>
                        </div>
                    </div>

                    <div class="small-metrics">
                        <div class="metric-card card">
                            <h4 style="color:var(--text-dim); font-size:12px; letter-spacing:2px;">TOTAL CALORIES</h4>
                            <div class="val">2,150</div>
                            <p style="color:var(--success); font-weight:800;">+12% vs last week</p>
                        </div>
                        <div class="metric-card card" style="background:var(--primary);">
                            <h4 style="color:#fff; font-size:12px; letter-spacing:2px; opacity:0.8;">HABIT SCORE</h4>
                            <div class="val" style="color:#fff">92</div>
                            <p style="color:#fff; font-weight:800;">Excellent Streak!</p>
                        </div>
                    </div>
                </section>
            </div>
        </section>
    </div>

    <!-- Menu Overlay -->
    <div class="overlay" id="menuOverlay">
        <button
            style="position:fixed; top:50px; right:50px; background:rgba(255,255,255,0.1); border:none; width:70px; height:70px; border-radius:24px; color:#fff; cursor:pointer; font-size:30px;"
            onclick="toggleMenu()"><i class="fa-solid fa-xmark"></i></button>
        <div class="overlay-grid">
            <a href="about.html" class="overlay-card"><i class="fa-solid fa-info-circle"></i><b>About App</b></a>
            <a href="streak.html" class="overlay-card"><i class="fa-solid fa-trophy"
                    style="color:var(--warning)"></i><b>Trophy Room</b></a>
            <a href="library.html" class="overlay-card"><i class="fa-solid fa-book-open"></i><b>Library</b></a>
            <a href="buddybot.html" class="overlay-card"><i class="fa-solid fa-robot"
                    style="color:var(--success)"></i><b>Buddy Bot</b></a>
            <a href="people_progress.html" class="overlay-card"><i class="fa-solid fa-users"
                    style="color:var(--secondary)"></i><b>People's Progress</b></a>
            <a href="notifications.html" class="overlay-card"><i class="fa-solid fa-bell"></i><b>Notifications</b></a>
            <a href="settings.html" class="overlay-card"><i class="fa-solid fa-cog"></i><b>Settings</b></a>
        </div>
    </div>

    <script>
        function toggleMenu() { document.getElementById('menuOverlay').classList.toggle('active'); }
    </script>
</body>

</html>
