<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Information | Hive Console</title>
    <link rel="stylesheet" href="global.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .edit-form-container {
            max-width: 500px;
            margin: 0 auto;
        }

        .edit-card {
            background: #fff;
            border-radius: 40px;
            padding: 50px;
            border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.05);
        }

        .form-group {
            margin-bottom: 30px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 900;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-bottom: 15px;
            padding-left: 5px;
        }

        .form-group div.field-box {
            background: #f1f5f9;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            padding: 20px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }

        .form-group div.field-box:focus-within {
            background: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 0 5px var(--primary-glow);
        }

        .form-group input {
            background: transparent;
            border: none;
            width: 100%;
            font-size: 18px;
            font-weight: 800;
            color: #1e293b;
            outline: none;
        }

        .save-btn {
            width: 100%;
            padding: 22px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.2);
            transition: 0.3s;
        }

        .save-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(139, 92, 246, 0.3);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            font-weight: 800;
            color: var(--text-soft);
            font-size: 14px;
            margin-bottom: 30px;
            transition: 0.3s;
        }

        .back-btn:hover {
            color: var(--primary);
            transform: translateX(-5px);
        }
    </style>
</head>

<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-logo"><i class="fa-solid fa-rocket"></i></div>
            <nav class="nav-links">
                <a href="home.html" class="nav-link"><i class="fa-solid fa-house"></i><span>Home</span></a>
                <a href="library.html" class="nav-link"><i class="fa-solid fa-book-open"></i><span>Library</span></a>
                <a href="dashboard.html" class="nav-link"><i
                        class="fa-solid fa-chart-simple"></i><span>Dashboard</span></a>
                <a href="progress.html" class="nav-link"><i
                        class="fa-solid fa-arrow-trend-up"></i><span>Progress</span></a>
            </nav>
            <div class="sidebar-footer">
                <a href="profile.html" class="nav-link active"><i
                        class="fa-solid fa-circle-user"></i><span>Profile</span></a>
            </div>
        </aside>

        <main class="main-wrapper">
            <header class="top-header">
                <div class="header-title">
                    <h1>EDIT INFORMATION</h1>
                </div>
                <div class="header-actions">
                    <div class="bee-logo-container" id="menuTrigger"><img src="diethive_bee_logo_1773055236604.png"
                            alt="Bee"></div>
                </div>
            </header>

            <section class="content-area fade-in">
                <div class="edit-form-container">
                    <a href="profile.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> RETURN TO PROFILE</a>

                    <div class="edit-card">
                        <h2 style="font-family:'Outfit'; font-weight:900; font-size: 32px; margin-bottom: 40px;">Modify
                            Identity</h2>

                        <form onsubmit="event.preventDefault(); window.location.href='profile.html'">
                            <div class="form-group">
                                <label>Registration Name</label>
                                <div class="field-box">
                                    <i class="fa-solid fa-user" style="color: var(--primary);"></i>
                                    <input type="text" id="userName" value="Buddy Explorer" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Identity Age</label>
                                <div class="field-box">
                                    <i class="fa-solid fa-calendar-day" style="color: var(--secondary);"></i>
                                    <input type="number" id="userAge" value="24" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Global Access Key (Read Only)</label>
                                <div class="field-box" style="opacity: 0.6; cursor: not-allowed;">
                                    <i class="fa-solid fa-lock" style="color: var(--text-muted);"></i>
                                    <input type="email" value="buddy@diethive.com" readonly
                                        style="cursor: not-allowed;">
                                </div>
                            </div>

                            <button type="submit" class="save-btn">UPDATE NEURAL SYNC <i
                                    class="fa-solid fa-bolt"></i></button>
                        </form>
                    </div>
                </div>
            </section>

        </main>
    </div>

</body>

</html>
